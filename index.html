<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TyperTools Pro</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="logo">TYPERTOOLS PRO</div>
    <div class="header-actions">
      <button onclick="openStyleModal()" class="btn-nav" title="Estilos">🎨</button>
      <button onclick="openConfigModal()" class="btn-nav" title="Configurações">⚙️</button>
    </div>
  </header>

  <main class="main-content">
    <textarea id="textInput" placeholder="Cole seu script aqui..."></textarea>

    <div class="controls-card">
      <select id="styleSelect">
        <option value="-1">-- Selecione o Estilo --</option>
      </select>

      <div class="nav-row">
        <button onclick="prevLine()" class="btn-nav" title="Voltar">⬅️</button>
        <div id="counter">0 / 0</div>
        <button onclick="nextLine()" class="btn-nav" title="Próximo">➡️</button>
      </div>

      <button onclick="run()" class="btn-main">Gerar Texto</button>
    </div>

    <div id="previewContainer">
      <div class="empty-state">Aguardando texto...</div>
    </div>
  </main>

  <!-- MODAL ESTILOS -->
  <div id="styleModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Gerenciar Estilos</h3>
        <button onclick="closeStyleModal()" class="btn-icon">✕</button>
      </div>
      
      <div class="form-group">
        <label>Nome do Estilo</label>
        <input type="text" id="styleName" placeholder="Ex: Fala Normal">
      </div>
      
      <div class="form-group">
        <label>Fonte (Nome exato no Photopea)</label>
        <input type="text" id="styleFont" placeholder="Ex: ArialMT">
      </div>
      
      <div class="form-group">
        <label>Tamanho (px)</label>
        <input type="number" id="styleSize" value="32">
      </div>

      <button onclick="saveStyle()" class="btn-main" style="width: 100%;">Salvar Estilo</button>

      <div id="styleList" class="style-list"></div>
    </div>
  </div>

  <!-- MODAL CONFIG -->
  <div id="configModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Filtros de Linha</h3>
        <button onclick="closeConfigModal()" class="btn-icon">✕</button>
      </div>
      <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 10px;">
        Linhas que começam com estes termos serão ignoradas:
      </p>
      <textarea id="ignoreInput" style="height: 150px; font-family: monospace;"></textarea>
      <button onclick="saveConfig()" class="btn-main" style="width: 100%; margin-top: 12px;">Salvar Filtros</button>
    </div>
  </div>

  <div id="toast" class="toast">Mensagem</div>

  <script src="app.js"></script>
</body>
</html>
