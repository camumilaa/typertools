<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>TyperTools</h2>

<textarea id="text" placeholder="Cole o texto aqui..."></textarea>

<div id="controls">
  <button onclick="nextLine()">Próximo</button>
  <button onclick="run()">Gerar</button>
  <button onclick="toggleConfig()">⚙️</button>
</div>

<div id="preview"></div>

<div id="config" class="hidden">
  <h3>Ignorar linhas contendo:</h3>
  <textarea id="ignore"></textarea>
</div>

<script src="app.js"></script>
</body>
</html>
