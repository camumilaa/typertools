<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="topbar">
  <span>TyperTools</span>
  <div>
    <button onclick="toggleStyle()">🎨</button>
    <button onclick="toggleConfig()">⚙️</button>
  </div>
</div>

<textarea id="text" placeholder="Cole o texto aqui..."></textarea>

<div id="controls">
  <button onclick="nextLine()">Próximo</button>
  <button onclick="run()">Gerar</button>
</div>

<select id="styleSelect"></select>

<div id="preview"></div>

<!-- CONFIG -->
<div id="configModal" class="modal hidden">
  <div class="modal-content">
    <h3>Ignorar linhas</h3>
    <textarea id="ignore"></textarea>
    <button onclick="saveConfig()">Salvar</button>
    <button onclick="toggleConfig()">Fechar</button>
  </div>
</div>

<!-- STYLE -->
<div id="styleModal" class="modal hidden">
  <div class="modal-content">

    <h3>Estilos</h3>

    <!-- CRIAR / EDITAR -->
    <input id="styleName" placeholder="Nome do estilo (ex: Fala, Grito)">

    <input id="fontFamily" placeholder="Fonte (ex: ArialMT, WildWords)">

    <input id="fontSize" type="number" value="32" placeholder="Tamanho da fonte">

    <button onclick="saveStyle()">Salvar / Atualizar</button>

    <hr>

    <!-- LISTA DE ESTILOS -->
    <div id="styleManager"></div>

    <button onclick="toggleStyle()">Fechar</button>

  </div>
</div>
<script src="app.js"></script>
</body>
</html>
