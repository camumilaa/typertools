<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  background:#1e1e1e;
  color:white;
  font-family:Arial;
  padding:10px;
}

textarea {
  width:100%;
  height:100px;
}

#preview {
  margin-top:10px;
  border-top:1px solid #555;
  padding-top:10px;
}

.item {
  background:#2a2a2a;
  padding:5px;
  margin:5px 0;
}
</style>
</head>

<body>

<h3>TyperTools</h3>

<textarea id="text" placeholder="Uma fala por linha" oninput="updatePreview()"></textarea>

<div id="preview"></div>

<br>

<button onclick="run()">Gerar no Photopea</button>

<script>
function updatePreview(){
  let raw = document.getElementById("text").value;
  let lines = raw.split("\n").filter(l => l.trim() !== "");

  let preview = document.getElementById("preview");
  preview.innerHTML = "";

  lines.forEach((line, i) => {
    let div = document.createElement("div");
    div.className = "item";
    div.textContent = (i+1) + " - " + line;
    preview.appendChild(div);
  });
}

function run(){
  let raw = document.getElementById("text").value;
  let lines = raw.split("\n").filter(l => l.trim() !== "");

  let script = `
  var lines = ${JSON.stringify(lines)};
  var y = 150;

  for (var i = 0; i < lines.length; i++) {

    var layer = app.activeDocument.artLayers.add();
    layer.kind = LayerKind.TEXT;

    layer.textItem.contents = lines[i];
    layer.textItem.position = [200, y];

    y += 70;
  }
  `;

  window.parent.postMessage(script, "*");
}
</script>

</body>
</html>
